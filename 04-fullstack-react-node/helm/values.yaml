namespace: production

frontend:
  image:
    repository: ""
    tag: latest
    pullPolicy: Always
  replicas: 2
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

backend:
  image:
    repository: ""
    tag: latest
    pullPolicy: Always
  replicas: 2
  port: 3001
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  env:
    NODE_ENV: production
    PORT: "3001"